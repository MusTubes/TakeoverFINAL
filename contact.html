<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takeover Contact Page</title>
  <link rel="stylesheet" href="mystyle.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .navbar-custom {
      background-color: #0b73c9;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 30px;
      border-bottom: 4px solid #d9d9d9;
    }

    .navbar-logo img {
      height: 60px;
      width: auto;
      display: block;
    }

    .navbar-menu {
      list-style: none;
      display: flex;
      align-items: flex-start;
      gap: 50px;
      margin: 0;
      padding: 0;
    }

    .navbar-menu li a {
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-weight: bold;
      font-size: 14px;
      text-transform: uppercase;
    }

    .navbar-menu li a img {
      margin-top: 6px;
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .navbar-menu li a:hover {
      color: #111;
    }

    .contact-wrapper {
      width: 100%;
      padding: 40px 60px;
    }

    .contact-left {
      width: 100%;
    }

    .p3 {
      font-size: 1.8rem;
      font-weight: bold;
      border: 2px solid #333;
      padding: 30px 40px;
      background: white;
      width: 60%;
      margin: 0 auto 30px;
      text-align: center;
    }

    .p12 {
      font-size: 1rem;
      border: 2px solid #333;
      padding: 20px 30px;
      background: white;
      width: 60%;
      margin: 30px auto 0;
      text-align: center;
    }

    .laptop-imgs {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 80%;
      margin: 0 auto;
    }

    .laptop-imgs img {
      width: 40%;
      height: 260px;
      object-fit: cover;
      border: 2px solid #ddd;
    }

    .idea-button {
      display: inline-block;
      background-color: #198754;
      color: white;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .idea-button:hover {
      background-color: #111111;
      color: white;
    }

    @media (max-width: 768px) {
      .navbar-custom {
        flex-direction: column;
        gap: 15px;
      }

      .navbar-menu {
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .p3,
      .p12,
      .laptop-imgs {
        width: 100%;
      }

      .laptop-imgs {
        flex-direction: column;
        gap: 20px;
      }

      .laptop-imgs img {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <header class="navbar-custom">
    <a href="index.html" class="navbar-logo">
      <img src="Company Assets/takeover logo trans.png" alt="Takeover logo">
    </a>

    <ul class="navbar-menu">
      <li>
        <a href="news.html">
          News
          <img src="Icons/News Logo.png" alt="News icon">
        </a>
      </li>
      <li>
        <a href="contact.html">
          Contact Page
          <img src="Icons/contact.png" alt="Contact icon">
        </a>
      </li>
      <li>
        <a href="gallery.html">
          News Gallery
          <img src="Icons/Gallery (2).png" alt="Gallery icon">
        </a>
      </li>
    </ul>
  </header>

  <div class="contact-wrapper">
    <div class="contact-left">
      <p class="p3">Do you like Takeover and would like to share your ideas and questions with us??</p>

      <div class="d-flex justify-content-center mt-4">
        <a href="form.html" class="idea-button">Enter Your Ideas Now!!!!!!</a>
      </div>

      <div class="laptop-imgs mt-5">
        <img src="Images/LaptopIMG1.jpeg" alt="People using their laptops">
        <img src="Images/LaptopIMG3.jpeg" alt="Young man using his laptop">
      </div>

      <p class="p12">
        This website was created by the Takeover team as a youth-focused technology news website designed for ages 14–18.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
